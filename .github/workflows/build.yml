name: Build BootHelper APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          ANDROID_SDK_ROOT=$ANDROID_HOME
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-28" "build-tools;28.0.3"

      - name: Build APK manually
        run: |
          BTDIR=$ANDROID_SDK_ROOT/build-tools/28.0.3
          ANDROID_JAR=$ANDROID_SDK_ROOT/platforms/android-28/android.jar
          mkdir -p build/gen build/obj build/apk/unpacked
          LOG=build/build.log
          
          # 1. link manifest
          echo "=== STEP 1: aapt2 link ===" | tee -a $LOG
          $BTDIR/aapt2 link -o build/apk/base.apk \
            -I $ANDROID_JAR --manifest app/src/main/AndroidManifest.xml 2>&1 | tee -a $LOG
          echo "EXIT=$?" | tee -a $LOG
          
          # 2. compile java
          echo "=== STEP 2: javac ===" | tee -a $LOG
          find app/src/main/java -name "*.java" -exec javac -d build/obj \
            -classpath $ANDROID_JAR -source 1.8 -target 1.8 {} \; 2>&1 | tee -a $LOG
          echo "EXIT=$?" | tee -a $LOG
          
          # 3. dex
          echo "=== STEP 3: d8 ===" | tee -a $LOG
          CLASSES=$(find build/obj -name "*.class")
          if [ -n "$CLASSES" ]; then
            java -jar $BTDIR/lib/d8.jar --output build/apk/unpacked/ $CLASSES 2>&1 | tee -a $LOG
            echo "EXIT=$?" | tee -a $LOG
          else
            echo "NO .class FILES FOUND" | tee -a $LOG
          fi
          
          # 4. package
          echo "=== STEP 4: package ===" | tee -a $LOG
          (cd build/apk && unzip -q base.apk -d unpacked && \
           mv ../unpacked/classes.dex unpacked/ 2>/dev/null || true && \
           cd unpacked && zip -qr ../unsigned.apk .) 2>&1 | tee -a $LOG
          echo "EXIT=$?" | tee -a $LOG
          
          # 5. sign
          echo "=== STEP 5: sign ===" | tee -a $LOG
          if [ -f build/apk/unsigned.apk ]; then
            keytool -genkey -v -keystore build/debug.keystore -storepass android \
              -alias a -keypass android -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=A,O=A,C=US" 2>&1 | tee -a $LOG
            $BTDIR/apksigner sign --ks build/debug.keystore --ks-pass pass:android \
              --out build/BootHelper.apk build/apk/unsigned.apk 2>&1 | tee -a $LOG
            echo "EXIT=$?" | tee -a $LOG
          else
            echo "NO unsigned.apk" | tee -a $LOG
          fi
          
          echo "=== FINAL ===" | tee -a $LOG
          ls -la build/BootHelper.apk 2>&1 | tee -a $LOG
          # Print summary to stderr for GitHub annotations
          tail -20 $LOG >&2

      - name: Show build log on failure
        if: failure()
        run: cat build/build.log

      - uses: actions/upload-artifact@v4
        with:
          name: BootHelper
          path: build/BootHelper.apk
