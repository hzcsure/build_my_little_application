name: Build BootHelper APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Debug existing SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls -la $ANDROID_HOME 2>/dev/null || echo "No ANDROID_HOME"
          ls -la /usr/local/lib/android/sdk 2>/dev/null || echo "No /usr/local/lib/android/sdk"
          ls -la $HOME/android-sdk 2>/dev/null || echo "No ~/android-sdk"
          which sdkmanager 2>/dev/null || echo "No sdkmanager"

      - uses: gradle/actions/setup-gradle@v3

      - name: Build APK
        run: gradle assembleRelease --no-daemon

      - name: Sign APK
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" ! -name "unsigned" | head -1)
          keytool -genkey -v -keystore debug.keystore -alias debug -keyalg RSA \
            -keysize 2048 -validity 10000 -storepass android -keypass android \
            -dname "CN=BootHelper, OU=Dev, O=BootHelper, L=NA, ST=NA, C=US"
          $ANDROID_HOME/build-tools/28.0.3/apksigner sign \
            --ks debug.keystore --ks-pass pass:android \
            --out app/build/outputs/apk/release/BootHelper.apk \
            "$APK"

      - uses: actions/upload-artifact@v4
        with:
          name: BootHelper
          path: app/build/outputs/apk/release/BootHelper.apk
