name: Build BootHelper APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          ANDROID_SDK_ROOT=$ANDROID_HOME
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-28" "build-tools;28.0.3"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          # Disable cache to avoid cache service 400 errors
          cache-disabled: true

      - name: Show gradle version
        run: gradle --version

      - name: List project structure
        run: find . -name "*.gradle" -o -name "AndroidManifest.xml" -o -name "*.java" | head -20

      - name: Build APK (debug)
        run: |
          echo "===== AVAILABLE TASKS ====="
          gradle --no-daemon tasks --all 2>&1 | grep -iE "assemble|debug|android" | head -30
          echo "===== CLEAN BUILD ====="
          gradle --no-daemon clean assembleDebug 2>&1 | tee build-log.txt
          echo "===== FIND APK ====="
          find . -name "*.apk" -ls 2>/dev/null
          echo "===== ENTIRE BUILD DIR ====="
          ls -laR app/build/ 2>/dev/null || echo "No app/build/"
          echo "===== CURRENT DIR ====="
          pwd && ls -la

      - name: Create Release with APK
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0
          name: BootHelper v1.0
          files: app/build/outputs/apk/debug/app-debug.apk
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: BuildLogs
          path: build-log.txt
