name: Build BootHelper APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-28" "build-tools;28.0.3"

      - uses: gradle/actions/setup-gradle@v3

      - name: Build APK
        working-directory: ${{ github.workspace }}
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          chmod +x gradlew 2>/dev/null || touch gradlew
          gradle assembleRelease --no-daemon

      - name: Sign APK
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" ! -name "unsigned" | head -1)
          echo "APK=$APK"
          keytool -genkey -v -keystore debug.keystore -alias debug -keyalg RSA \
            -keysize 2048 -validity 10000 -storepass android -keypass android \
            -dname "CN=BootHelper, OU=Dev, O=BootHelper, L=NA, ST=NA, C=US" \
            2>/dev/null || true
          $ANDROID_SDK_ROOT/build-tools/28.0.3/apksigner sign \
            --ks debug.keystore --ks-pass pass:android \
            --out app/build/outputs/apk/release/BootHelper.apk \
            "$APK"

      - uses: actions/upload-artifact@v4
        with:
          name: BootHelper
          path: app/build/outputs/apk/release/BootHelper.apk
