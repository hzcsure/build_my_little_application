name: Build TVHome APK

on:
  push:
    branches: [launcher, tvhome]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          ANDROID_SDK_ROOT=$ANDROID_HOME
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-28" "build-tools;28.0.3"

      - name: Build APK
        run: |
          set -e
          BTDIR=$ANDROID_SDK_ROOT/build-tools/28.0.3
          JAR=$ANDROID_SDK_ROOT/platforms/android-28/android.jar
          rm -rf build; mkdir -p build/obj build/apk

          echo "--- 1. aapt2: link manifest ---"
          $BTDIR/aapt2 link -o build/apk/base.apk -I $JAR \
            --manifest app/src/main/AndroidManifest.xml

          echo "--- 2. javac ---"
          find app/src/main/java -name "*.java" > build/sources.txt
          javac -d build/obj -classpath $JAR -source 1.8 -target 1.8 @build/sources.txt
          find build/obj -name "*.class" | head

          echo "--- 3. d8 ---"
          java -jar $BTDIR/lib/d8.jar --output build/apk/ \
            $(find build/obj -name "*.class")
          ls -la build/apk/classes.dex

          echo "--- 4. package ---"
          cd build/apk
          unzip -q base.apk -d unpacked
          cp classes.dex unpacked/
          cd unpacked && zip -qr ../unsigned.apk .
          cd $GITHUB_WORKSPACE
          ls -la build/apk/unsigned.apk

          echo "--- 5. sign ---"
          keytool -genkey -keystore build/debug.ks -storepass android \
            -alias a -keypass android -keyalg RSA -keysize 2048 -validity 36500 \
            -dname "CN=TVHome" 2>/dev/null || true
          $BTDIR/apksigner sign --ks build/debug.ks --ks-pass pass:android \
            --out build/TVHome.apk build/apk/unsigned.apk

          echo "--- DONE ---"
          ls -la build/TVHome.apk

      - uses: actions/upload-artifact@v4
        with:
          name: TVHome
          path: build/TVHome.apk
