name: Build BootHelper APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          ANDROID_SDK_ROOT=$ANDROID_HOME
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-28" "build-tools;28.0.3"

      - name: Build APK manually
        id: build_apk
        continue-on-error: true
        run: |
          BTDIR=$ANDROID_SDK_ROOT/build-tools/28.0.3
          ANDROID_JAR=$ANDROID_SDK_ROOT/platforms/android-28/android.jar
          
          mkdir -p build/gen build/obj build/apk/unpacked
          
          echo "=== 1. Check SDK ==="
          ls -la $BTDIR/
          ls -la $ANDROID_JAR
          which javac && javac -version
          
          echo "=== 2. aapt2 link ==="
          $BTDIR/aapt2 link -o build/apk/base.apk \
            -I $ANDROID_JAR \
            --manifest app/src/main/AndroidManifest.xml 2>&1 || true
          ls -la build/apk/base.apk 2>/dev/null || echo "base.apk NOT created"
          
          echo "=== 3. javac ==="
          find app/src/main/java -name "*.java" -exec javac -d build/obj -classpath $ANDROID_JAR -source 1.8 -target 1.8 {} \; 2>&1 || true
          find build/obj -name "*.class" -ls || echo "No .class files"
          
          echo "=== 4. d8 dex ==="
          CLASSES=$(find build/obj -name "*.class" | head -10)
          if [ -n "$CLASSES" ]; then
            java -jar $BTDIR/lib/d8.jar --output build/apk/unpacked/ $CLASSES 2>&1 || true
          else
            echo "No classes to dex"
          fi
          ls -la build/apk/unpacked/classes.dex 2>/dev/null || echo "No classes.dex"
          
          echo "=== 5. Package APK ==="
          cd build/apk
          if [ -f base.apk ]; then
            unzip -o base.apk -d unpacked 2>&1
            cd unpacked
            # Add classes.dex if it exists
            [ -f ../unpacked/classes.dex ] || cp ../classes.dex . 2>/dev/null
            zip -qr ../unsigned.apk . 2>&1
            cd ..
            ls -la unsigned.apk 2>/dev/null || echo "unsigned.apk NOT created"
          fi
          cd $GITHUB_WORKSPACE
          
          echo "=== 6. Sign ==="
          if [ -f build/apk/unsigned.apk ]; then
            keytool -genkey -v -keystore build/debug.keystore -storepass android \
              -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 \
              -validity 10000 -dname "CN=Debug,O=Debug,C=US" 2>&1
            $BTDIR/apksigner sign --ks build/debug.keystore --ks-pass pass:android \
              --out build/BootHelper.apk build/apk/unsigned.apk 2>&1 || true
            echo "SIGNED: $(ls -la build/BootHelper.apk 2>/dev/null)"
          fi
          
          echo "=== 7. FINAL ==="
          find build -name "*.apk" -ls

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.${{ github.run_number }}
          name: BootHelper
          body: Auto-built BootHelper APK
          files: build/BootHelper.apk
          make_latest: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
