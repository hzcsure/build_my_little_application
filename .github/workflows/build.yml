name: Build TVHome APK

on:
  push:
    branches: [tvhome, main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          ANDROID_SDK_ROOT=$ANDROID_HOME
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-28" "build-tools;28.0.3"

      - name: Build APK manually
        run: |
          BTDIR=$ANDROID_SDK_ROOT/build-tools/28.0.3
          ANDROID_JAR=$ANDROID_SDK_ROOT/platforms/android-28/android.jar
          mkdir -p build/obj build/apk/unpacked

          echo "=== Structure check ==="
          ls -la app/src/main/
          ls -la app/src/main/java/com/ab/tvhome/

          # 1. aapt2 link manifest
          echo "=== aapt2 link ==="
          $BTDIR/aapt2 link -o build/apk/base.apk \
            -I $ANDROID_JAR --manifest app/src/main/AndroidManifest.xml 2>&1
          ls -la build/apk/base.apk 2>&1

          # 2. compile java
          echo "=== javac ==="
          find app/src/main/java -name "*.java" -exec javac -d build/obj \
            -classpath $ANDROID_JAR -source 1.8 -target 1.8 {} \; 2>&1
          echo "Class files:"
          find build/obj -name "*.class" -ls 2>&1

          # 3. dex
          echo "=== d8 ==="
          CLASSES=$(find build/obj -name "*.class")
          if [ -n "$CLASSES" ]; then
            java -jar $BTDIR/lib/d8.jar --output build/apk/unpacked/ $CLASSES 2>&1
          else
            echo "NO .class files - javac failed"
            exit 1
          fi
          ls -la build/apk/unpacked/classes.dex 2>&1

          # 4. package
          echo "=== Package ==="
          cd build/apk
          unzip -q base.apk -d unpacked
          cp ../unpacked/classes.dex unpacked/ 2>/dev/null || true
          cd unpacked && zip -qr ../unsigned.apk . && cd ../..
          ls -la build/apk/unsigned.apk 2>&1

          # 5. sign
          echo "=== Sign ==="
          keytool -genkey -v -keystore build/debug.keystore -storepass android \
            -alias a -keypass android -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=A,O=A,C=US" 2>&1
          $BTDIR/apksigner sign --ks build/debug.keystore --ks-pass pass:android \
            --out build/TVHome.apk build/apk/unsigned.apk 2>&1
          echo "RESULT:"
          ls -la build/TVHome.apk 2>&1

      - uses: actions/upload-artifact@v4
        with:
          name: TVHome
          path: build/TVHome.apk
