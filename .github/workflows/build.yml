name: Build BootHelper APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          ANDROID_SDK_ROOT=$ANDROID_HOME
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-28" "build-tools;28.0.3"

      - uses: gradle/actions/setup-gradle@v3

      - name: Build APK
        run: gradle assembleRelease --no-daemon --stacktrace 2>&1 | tee build-log.txt

      - name: Dump build log on failure
        if: failure()
        run: |
          echo "========= BUILD FAILED - FULL LOG ========="
          cat build-log.txt
          echo "========= GRADLE STDERR ========="
          find . -name "*.log" -exec cat {} \; 2>/dev/null
          find app/build -name "*.log" -exec cat {} \; 2>/dev/null

      - name: Sign APK
        if: success()
        run: |
          echo "=== All APKs ===" && find app/build -name "*.apk" -ls
          APK=$(find app/build -name "*.apk" -not -name "BootHelper.apk" | head -1)
          echo "Signing: $APK"
          keytool -genkey -v -keystore debug.keystore -alias debug -keyalg RSA \
            -keysize 2048 -validity 10000 -storepass android -keypass android \
            -dname "CN=BootHelper, OU=Dev, O=BootHelper, L=NA, ST=NA, C=US"
          $ANDROID_SDK_ROOT/build-tools/28.0.3/apksigner sign \
            --ks debug.keystore --ks-pass pass:android \
            --out app/build/outputs/apk/release/BootHelper.apk \
            "$APK"

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: BootHelper
          path: app/build/outputs/apk/release/BootHelper.apk
