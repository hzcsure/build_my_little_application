name: Build BootHelper APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          ANDROID_SDK_ROOT=$ANDROID_HOME
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-28" "build-tools;28.0.3"

      - uses: gradle/actions/setup-gradle@v3

      - name: Build APK (debug)
        run: gradle assembleDebug --no-daemon --stacktrace 2>&1 | tee build-log.txt

      - name: Dump build log on failure
        if: failure()
        run: |
          echo "===== BUILD FAILED ====="
          cat build-log.txt

      - name: Find APK
        if: success()
        run: |
          find app -name "*.apk" -ls
          find . -name "*.apk" -ls

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: BootHelper
          path: "**/*.apk"
