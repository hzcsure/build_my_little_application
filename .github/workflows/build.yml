name: Build BootHelper APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-28 build-tools;28.0.3'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build APK
        run: gradle assembleRelease

      - name: Sign APK
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" ! -name "*.apk.*" ! -name "*unsigned*" | head -1)
          echo "Unsigned APK: $APK"
          keytool -genkey -v -keystore debug.keystore -alias debug -keyalg RSA \
            -keysize 2048 -validity 10000 -storepass android -keypass android \
            -dname "CN=BootHelper, OU=Dev, O=BootHelper, L=N/A, ST=N/A, C=US" \
            2>/dev/null || true
          $ANDROID_SDK_ROOT/build-tools/28.0.3/apksigner sign \
            --ks debug.keystore --ks-pass pass:android \
            --out app/build/outputs/apk/release/BootHelper.apk \
            "$APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BootHelper
          path: app/build/outputs/apk/release/BootHelper.apk
